<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>涟漪 · 沉浸办公</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #080c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: linear-gradient(145deg, rgba(10, 18, 38, 0.85), rgba(6, 12, 28, 0.95));
            border-radius: 48px;
            padding: 60px 50px;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            display: inline-block;
            background: rgba(255,255,255,0.03);
            border-radius: 100px;
            padding: 8px 24px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }

        h1 {
            font-size: 52px;
            font-weight: 300;
            color: rgba(255,255,255,0.9);
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        h1 span {
            background: linear-gradient(135deg, #50e6ff, #0088cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 500;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.3);
            font-weight: 300;
            letter-spacing: 2px;
            max-width: 600px;
            margin: 0 auto 6px;
        }

        .subtitle-small {
            font-size: 13px;
            color: rgba(255,255,255,0.15);
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* 下载按钮 — 悬浮在水面中 */
        .download-section {
            text-align: center;
            margin: 50px 0 60px;
            position: relative;
        }

        .download-section .ripple-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(80, 200, 255, 0.06);
            width: 320px;
            height: 320px;
            animation: pulse-ring 4s ease-in-out infinite;
            pointer-events: none;
        }

        .download-section .ripple-ring:nth-child(2) {
            width: 420px;
            height: 420px;
            animation-delay: 1.2s;
        }

        .download-section .ripple-ring:nth-child(3) {
            width: 520px;
            height: 520px;
            animation-delay: 2.4s;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.1; }
            100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.6; }
        }

        .btn-download {
            display: inline-block;
            background: linear-gradient(135deg, #50e6ff, #0077cc);
            color: #0b0d15;
            font-weight: 500;
            font-size: 20px;
            padding: 18px 56px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(80, 230, 255, 0.15);
            position: relative;
            z-index: 2;
        }

        .btn-download:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 48px rgba(80, 230, 255, 0.25);
        }

        .btn-download:active {
            transform: scale(0.97);
        }

        .download-hint {
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.5px;
        }

        .download-hint strong {
            color: rgba(255,255,255,0.3);
            font-weight: 400;
        }

        /* 底部信息 */
        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px 40px;
        }

        .footer-item {
            text-align: center;
            min-width: 120px;
        }

        .footer-item .label {
            font-size: 11px;
            color: rgba(255,255,255,0.12);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .footer-item .value {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            font-weight: 300;
        }

        .footer-item .value a {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-item .value a:hover {
            color: rgba(255,255,255,0.6);
        }

        @media (max-width: 700px) {
            .container {
                padding: 32px 20px;
            }
            h1 {
                font-size: 32px;
            }
            .btn-download {
                width: 100%;
                text-align: center;
                padding: 16px 24px;
                font-size: 17px;
            }
            .download-section .ripple-ring {
                width: 200px;
                height: 200px;
            }
            .download-section .ripple-ring:nth-child(2) {
                width: 280px;
                height: 280px;
            }
            .download-section .ripple-ring:nth-child(3) {
                width: 360px;
                height: 360px;
            }
            .footer {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">✦ 开源 · 免费</div>
            <h1>涟漪 <span>Ripple</span></h1>
            <p class="subtitle">仿 Mac 的沉浸办公工具</p>
            <p class="subtitle-small">轻量 · 优雅 · 帮您快速找到桌面文件</p>
        </div>

        <!-- 下载按钮 — 悬浮在水面中 -->
        <div class="download-section">
            <div class="ripple-ring"></div>
            <div class="ripple-ring"></div>
            <div class="ripple-ring"></div>
            <a class="btn-download" href="https://github.com/ripplepassage/ripple-assistant/releases" target="_blank">⬇ 下载体验</a>
            <div class="download-hint">
                <strong>Windows</strong> · 双击即用 · 无需安装
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="footer">
            <div class="footer-item">
                <div class="label">版本</div>
                <div class="value">一代 · 稳定版</div>
            </div>
            <div class="footer-item">
                <div class="label">历程</div>
                <div class="value">从涟漪到沉浸</div>
            </div>
            <div class="footer-item">
                <div class="label">核心理念</div>
                <div class="value">工具隐身 · 意图直达</div>
            </div>
            <div class="footer-item">
                <div class="label">GitHub</div>
                <div class="value"><a href="https://github.com/ripplepassage/ripple-assistant" target="_blank">开源仓库</a></div>
            </div>
        </div>
    </div>
</body>
</html>
