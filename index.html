<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>涟漪助手 · Ripple Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #080c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: linear-gradient(145deg, rgba(10, 18, 38, 0.85), rgba(6, 12, 28, 0.95));
            border-radius: 48px;
            padding: 60px 50px;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            display: inline-block;
            background: rgba(255,255,255,0.03);
            border-radius: 100px;
            padding: 8px 24px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }

        h1 {
            font-size: 52px;
            font-weight: 300;
            color: rgba(255,255,255,0.9);
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        h1 span {
            background: linear-gradient(135deg, #50e6ff, #0088cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 500;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.3);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .preview {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 50px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 260px;
            flex-direction: column;
            gap: 16px;
        }

        .preview-placeholder {
            font-size: 64px;
            opacity: 0.15;
            letter-spacing: 8px;
            user-select: none;
        }

        .preview-text {
            color: rgba(255,255,255,0.15);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 44px;
        }

        .feature-card {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 28px 24px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.25s ease;
        }

        .feature-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
            transform: translateY(-4px);
        }

        .feature-icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
            opacity: 0.6;
        }

        .feature-title {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .feature-desc {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            font-weight: 300;
            line-height: 1.5;
        }

        .download-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .btn-download {
            display: inline-block;
            background: linear-gradient(135deg, #50e6ff, #0077cc);
            color: #0b0d15;
            font-weight: 500;
            font-size: 18px;
            padding: 16px 48px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(80, 230, 255, 0.15);
        }

        .btn-download:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 48px rgba(80, 230, 255, 0.25);
        }

        .btn-download:active {
            transform: scale(0.97);
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.12);
            font-size: 13px;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 28px;
        }

        .footer a {
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: rgba(255,255,255,0.4);
        }

        .footer span {
            margin: 0 8px;
            opacity: 0.2;
        }

        @media (max-width: 700px) {
            .container {
                padding: 32px 20px;
            }
            h1 {
                font-size: 32px;
            }
            .features {
                grid-template-columns: 1fr;
            }
            .btn-download {
                width: 100%;
                text-align: center;
                padding: 14px 24px;
                font-size: 16px;
            }
            .preview {
                padding: 24px;
                min-height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">✦ 开源 · 免费</div>
            <h1>涟漪助手 <span>Ripple Assistant</span></h1>
            <p class="subtitle">将文件整理转化为视觉化仪式的桌面工具</p >
        </div>

        <div class="preview">
            <div class="preview-placeholder">✦ ✦ ✦</div>
            <div class="preview-text">涟漪效果演示 · 截图占位</div>
        </div>

        <div class="features">
            <div class="feature-card">
                <span class="feature-icon">📂</span>
                <div class="feature-title">整理桌面</div>
                <div class="feature-desc">自动将桌面文件按类型归类，显示为整齐的网格。</div>
            </div>
            <div class="feature-card">
                <span class="feature-icon">🔍</span>
                <div class="feature-title">找文件</div>
                <div class="feature-desc">输入关键词搜索桌面文件，双击直接打开。</div>
            </div>
        </div>

        <div class="download-section">
            <a class="btn-download" href=" " target="_blank">⬇ 下载体验</a >
        </div>

        <div class="footer">
            <a href="https://github.com/ripplepassage/ripple-assistant" target="_blank">GitHub 仓库</a >
            <span>·</span>
            开源 · 免费
        </div>
    </div>
</body>
</html>
